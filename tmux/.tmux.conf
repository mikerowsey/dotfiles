# ============================================================================
# tmux 3.7
# ============================================================================

# ----------------------------------------------------------------------------
# Terminal
# ----------------------------------------------------------------------------

set -g default-terminal "tmux-256color"

# Modern terminal capabilities
set -as terminal-features ",*:RGB"
set -as terminal-features ",*:extcursor"

# ----------------------------------------------------------------------------
# Prefix
# ----------------------------------------------------------------------------

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ----------------------------------------------------------------------------
# Numbering
# ----------------------------------------------------------------------------

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ----------------------------------------------------------------------------
# Behavior
# ----------------------------------------------------------------------------

set -g mouse off
set -sg escape-time 0
set -g history-limit 200000

setw -g mode-keys vi

# ----------------------------------------------------------------------------
# Splits
# ----------------------------------------------------------------------------

unbind '"'
unbind %

bind | split-window -h
bind - split-window -v

# ----------------------------------------------------------------------------
# Pane Navigation
# ----------------------------------------------------------------------------

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ----------------------------------------------------------------------------
# Configuration
# ----------------------------------------------------------------------------

bind r source-file ~/.tmux.conf \; display-message "Reloaded tmux.conf"

# ----------------------------------------------------------------------------
# Copy Mode
# ----------------------------------------------------------------------------

if-shell 'command -v pbcopy >/dev/null' \
    "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'"


# ----------------------------------------------------------------------------
# Status Line
# ----------------------------------------------------------------------------

set -g status-position top
set -g status-interval 1

# Catppuccin Mocha
set -g status-style "bg=#1e1e2e,fg=#9399b2"

# ----- Left ---------------------------------------------------------------

set -g status-left-length 20
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[default] "

setw -g window-status-separator ""

setw -g window-status-format \
"#[fg=#6c7086] #I:#W "

setw -g window-status-current-format \
"#[fg=#cdd6f4,bold] #I:#W "

# ----- Right --------------------------------------------------------------

set -g status-right-length 80

set -g status-right \
"#[fg=#6c7086]#{pane_current_path} #[bg=#89b4fa,fg=#1e1e2e,bold] #H #[default]"

# ----------------------------------------------------------------------------
# Pane Borders
# ----------------------------------------------------------------------------

set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=yellow

# ----------------------------------------------------------------------------
# Messages
# ----------------------------------------------------------------------------

set -g message-style bg=default,fg=yellow
