"$schema" = "https://starship.rs/config-schema.json"

palette = "catppuccin_mocha"

format = """
$os\
$username  \
$directory  \
$git_branch\
$git_status  \
$c\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
$conda\
$line_break\
$character"""

# -----------------------------------------------------------------------------
# OS / User
# -----------------------------------------------------------------------------

[os]
disabled = false
style = "fg:red"
format = "[$symbol ]($style)"

[os.symbols]
Windows = ""
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[username]
show_always = true
style_user = "fg:red"
style_root = "bold fg:red"
format = "[$user]($style)"

# -----------------------------------------------------------------------------
# Directory
# -----------------------------------------------------------------------------

[directory]
style = "fg:peach"
format = "[󰉋 $path]($style) "
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
Documents = "󰈙 "
Downloads = " "
Music = "󰝚 "
Pictures = " "
Developer = "󰲋 "

# -----------------------------------------------------------------------------
# Git
# -----------------------------------------------------------------------------

[git_branch]
symbol = ""
style = "fg:yellow"
format = "[$symbol $branch]($style) "

[git_status]
style = "fg:yellow"
format = "[$all_status$ahead_behind]($style) "

conflicted = "!"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "*${count}"
modified = "~${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "-${count}"

# -----------------------------------------------------------------------------
# Languages
# -----------------------------------------------------------------------------

[c]
symbol = ""
style = "fg:green"
format = "[$symbol $version]($style) "

[rust]
symbol = ""
style = "fg:green"
format = "[$symbol $version]($style) "

[golang]
symbol = ""
style = "fg:green"
format = "[$symbol $version]($style) "

[nodejs]
symbol = ""
style = "fg:green"
format = "[$symbol $version]($style) "

[bun]
symbol = ""
style = "fg:green"
format = "[$symbol $version]($style) "

[php]
symbol = ""
style = "fg:green"
format = "[$symbol $version]($style) "

[java]
symbol = ""
style = "fg:green"
format = "[$symbol $version]($style) "

[kotlin]
symbol = ""
style = "fg:green"
format = "[$symbol $version]($style) "

[haskell]
symbol = ""
style = "fg:green"
format = "[$symbol $version]($style) "

[python]
symbol = ""
style = "fg:green"
format = "[$symbol ${pyenv_prefix}(${version})( $virtualenv)]($style) "

# -----------------------------------------------------------------------------
# Conda
# -----------------------------------------------------------------------------

[conda]
symbol = ""
style = "fg:sapphire"
format = "[$symbol $environment]($style) "
ignore_base = false

# -----------------------------------------------------------------------------
# Prompt
# -----------------------------------------------------------------------------

[line_break]
disabled = false

[character]
success_symbol = "[❯](bold fg:green)"
error_symbol = "[❯](bold fg:red)"
vimcmd_symbol = "[❮](bold fg:green)"
vimcmd_replace_one_symbol = "[❮](bold fg:lavender)"
vimcmd_replace_symbol = "[❮](bold fg:lavender)"
vimcmd_visual_symbol = "[❮](bold fg:yellow)"

# -----------------------------------------------------------------------------
# Catppuccin Mocha
# -----------------------------------------------------------------------------

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
