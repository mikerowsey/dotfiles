set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:Tc,xterm*:Ss=\E[%p1%d q:Se=\E[2 q"

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g mouse off

set -sg escape-time 0

set -g history-limit 200000

bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind r source-file ~/.tmux.conf \; display "Reloaded tmux.conf"

set -g status-position top

set -g status-interval 2

set -g status-style bg=black,fg=brightwhite

set -g status-left-length 40
set -g status-left " #[fg=brightcyan]#S #[fg=brightblack]|#[default] "

setw -g window-status-format " #[fg=white]#I:#W "
setw -g window-status-current-format " #[fg=brightyellow,bold]#I:#W #[default] "

set -g status-right-length 80
set -g status-right " #[fg=brightblack]| #[fg=brightyellow]%Y-%m-%d %H:%M #[fg=brightcyan]#H "

set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=brightyellow

set -g message-style bg=black,fg=brightyellow

setw -g mode-keys vi

if-shell 'command -v pbcopy >/dev/null' \
    "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'"

if-shell 'command -v xclip >/dev/null' \
    "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"
